<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>StreetEatz | Gourmet Street Food Waterford</title>
    <meta name="description" content="StreetEatz Waterford — premium smash burgers, flatbreads, and loaded fries from Waterford's favourite food truck. Order online for pickup!" />
    <meta name="author" content="StreetEatz" />
    
    <!-- Preconnect to critical origins — improves FCP by starting connections early -->
    <link rel="preconnect" href="https://ftzinsesuiuqcjfpbaur.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://ftzinsesuiuqcjfpbaur.supabase.co" />
    <link rel="preconnect" href="https://storage.googleapis.com" crossorigin />
    <link rel="dns-prefetch" href="https://storage.googleapis.com" />

    <!-- Theme & Status Bar -->
    <meta name="theme-color" content="#0A0A0A" />
    <meta name="msapplication-TileColor" content="#0A0A0A" />
    <meta name="msapplication-navbutton-color" content="#0A0A0A" />
    
    <!-- iOS PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="StreetEatz" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- Mobile Web App Icons -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    
    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" href="/favicon.ico" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="StreetEatz | Gourmet Street Food Waterford" />
    <meta property="og:description" content="StreetEatz Waterford — premium smash burgers, flatbreads, and loaded fries from Waterford's favourite food truck. Order online for pickup!" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/pwa-512x512.png" />
    <meta property="og:site_name" content="StreetEatz" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@StreetEatzWaterford" />
    <meta name="twitter:title" content="StreetEatz | Gourmet Street Food Waterford" />
    <meta name="twitter:description" content="Order premium smash burgers, flatbreads, and loaded fries from StreetEatz Waterford." />
    <meta name="twitter:image" content="/pwa-512x512.png" />
    
    <!-- Prevent phone number detection -->
    <meta name="format-detection" content="telephone=no" />
    
    <!-- Critical inline styles — enables first paint before CSS bundle loads -->
    <style>
      * { -webkit-tap-highlight-color: transparent; }
      html { touch-action: manipulation; }
      body { margin: 0; background: #0A0A0A; }
      #root:empty {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        min-height: 100dvh;
      }
      #root:empty::after {
        content: '';
        width: 36px;
        height: 36px;
        border: 3px solid #333;
        border-top-color: #F97316;
        border-radius: 50%;
        animation: sp .7s linear infinite;
      }
      @keyframes sp { to { transform: rotate(360deg); } }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
